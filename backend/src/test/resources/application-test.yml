spring:
  main:
    lazy-initialization: true
  datasource:
    url: jdbc:h2:mem:aegisai_test;MODE=LEGACY;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=VALUE,KEY,ROLE,USER
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:test-schema.sql
  jpa:
    hibernate:
      ddl-auto: none
  rabbitmq:
    listener:
      simple:
        auto-startup: false

flowable:
  check-process-definitions: false
  database-schema-update: true

security:
  cross-site:
    guard-enabled: false

logging:
  level:
    com.trustai: info
