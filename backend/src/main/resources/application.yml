server:
  port: 8080

spring:
  # 数据源配置（MySQL，使用环境变量）
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/aegisai?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      max-lifetime: 1800000     # 30 minutes - must be shorter than MySQL wait_timeout
      idle-timeout: 600000      # 10 minutes
      keepalive-time: 60000     # 1 minute - prevents idle connections from being closed by server

  # H2 控制台（可选，但仅用于开发，数据源仍是 MySQL）
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

  # Jackson 日期格式化
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

  # RabbitMQ 配置
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:admin}
    password: ${SPRING_RABBITMQ_PASSWORD:123456}
    virtual-host: ${SPRING_RABBITMQ_VIRTUAL_HOST:/aegisai}
    connection-timeout: 3000
    listener:
      simple:
        acknowledge-mode: manual
        missing-queues-fatal: false
        auto-startup: false
        retry:
          enabled: true
          initial-interval: 3000
          max-attempts: 3

  # Redis 配置
  redis:
    host: ${SPRING_REDIS_HOST:localhost}
    port: ${SPRING_REDIS_PORT:6379}
    password: ${SPRING_REDIS_PASSWORD:}
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: 3000ms

  cloud:
    openfeign:
      client:
        config:
          aiInferenceClient:
            connect-timeout: 2000
            read-timeout: 5000

  # Elasticsearch 配置
  elasticsearch:
    uris: ${SPRING_ELASTICSEARCH_URIS:http://localhost:9200}

  data:
    elasticsearch:
      repositories:
        enabled: ${SPRING_DATA_ELASTICSEARCH_REPOSITORIES_ENABLED:true}

# Flowable 配置
flowable:
  check-process-definitions: true
  database-schema-update: true
  async-executor-activate: false

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    log-impl: ${MYBATIS_LOG_IMPL:org.apache.ibatis.logging.nologging.NoLoggingImpl}
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

# 日志配置
logging:
  level:
    com.trustai: ${APP_LOG_LEVEL:INFO}
    org.springframework.web: ${WEB_LOG_LEVEL:INFO}

# 自定义配置
ai:
  security:
    aes-key: ${AI_AES_KEY:12345678901234567890123456789012}
  routing:
    default-system-prompt: "你是一个安全合规的企业助手，回答需脱敏且遵守中国法律。"
  inference:
    base-url: ${AI_INFERENCE_URL:http://localhost:5000}

# 风险规则配置
risk:
  login:
    fail:
      threshold: 5
      window: 10
  sensitive:
    access:
      threshold: 20
  model:
    fail:
      rate: 0.3
  risk-level:
    allow-values: [LOW, MEDIUM, HIGH]

# 安全跨域配置
security:
  jwt:
    secret: ${SECURITY_JWT_SECRET:aegisai-secret-key-please-change-at-least-32-chars}
    expire-ms: ${SECURITY_JWT_EXPIRE_MS:43200000}
  client-ingress:
    enforce: ${CLIENT_INGRESS_ENFORCE:false}
    token: ${CLIENT_INGRESS_TOKEN:}
    default-company-id: ${CLIENT_INGRESS_DEFAULT_COMPANY_ID:1}
  cross-site:
    guard-enabled: ${CROSS_SITE_GUARD_ENABLED:true}
    allowed-origins: ${CROSS_SITE_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080}