<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dark Tech Background (optional backing) -->
    <radialGradient id="ringGlow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="rgba(255, 215, 0, 0.15)" />
      <stop offset="60%" stop-color="rgba(10, 17, 33, 0.05)" />
      <stop offset="100%" stop-color="transparent" />
    </radialGradient>

    <!-- Luxury Gold Gradient (The Aegis Wall) -->
    <linearGradient id="goldPlate" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A" />
      <stop offset="25%" stop-color="#FCD34D" />
      <stop offset="50%" stop-color="#D97706" />
      <stop offset="75%" stop-color="#B45309" />
      <stop offset="100%" stop-color="#FFFBEB" />
    </linearGradient>

    <!-- High-end Cyan Core (The AI Heart) -->
    <linearGradient id="cyanCore" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#67E8F9" />
      <stop offset="50%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#0891B2" />
    </linearGradient>

    <!-- Silver Inner Framework -->
    <linearGradient id="silverFrame" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#94A3B8" />
      <stop offset="50%" stop-color="#E2E8F0" />
      <stop offset="100%" stop-color="#64748B" />
    </linearGradient>

    <!-- Shadow & Glow Filters -->
    <filter id="coreGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="24" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="rgba(0,0,0,0.6)" />
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#ringGlow)" />

  <g filter="url(#dropShadow)">
    <!-- Outer Golden Shield / Monolithic 'A' Structure -->
    <path d="M256 32 
             L448 104 
             C448 280 384 416 256 480 
             C128 416 64 280 64 104 
             Z" 
          fill="none" 
          stroke="url(#goldPlate)" 
          stroke-width="32" 
          stroke-linejoin="round" />

    <!-- Silver Protective Ribs -->
    <path d="M256 80 
             L396 136 
             C396 276 348 384 256 432 
             C164 384 116 276 116 136 
             Z" 
          fill="none" 
          stroke="url(#silverFrame)" 
          stroke-width="12" 
          stroke-linejoin="round" />

    <path d="M116 136 L256 196 L396 136" 
          fill="none" 
          stroke="url(#silverFrame)" 
          stroke-width="12" 
          stroke-linejoin="round" />

    <path d="M256 196 L256 432" 
          fill="none" 
          stroke="url(#silverFrame)" 
          stroke-width="12" 
          stroke-linecap="round" />
  </g>

  <!-- Glowing AI Core (Neural Diamond) -->
  <path d="M256 220 
           L300 270 
           L256 320 
           L212 270 
           Z" 
        fill="url(#cyanCore)" 
        filter="url(#coreGlow)" />

  <!-- Center Node Highlight -->
  <circle cx="256" cy="270" r="12" fill="#FFFBEB" filter="url(#coreGlow)" />
</svg>